# Wi-Fi Configuration
CONFIG_NETWORKING=y
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y

# --- IP & DHCP ---
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y

CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=10

# --- Sockets & CoAP ---
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_TCP=y
CONFIG_COAP=y

# --- DTLS & MbedTLS Core ---
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384
CONFIG_ENTROPY_GENERATOR=y

# --- PSK Key Exchange ---
CONFIG_MBEDTLS_KEY_EXCHANGE_PSK_ENABLED=y

# --- Sockets & DTLS ---
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=y
CONFIG_NET_SOCKETS_DTLS_TIMEOUT=30000
CONFIG_TLS_CREDENTIALS=y
CONFIG_NET_SOCKETS_TLS_MAX_CLIENT_SESSION_COUNT=3
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=3
CONFIG_MBEDTLS_CIPHERSUITE_TLS_PSK_WITH_AES_256_CBC_SHA384=y
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=2048
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=2048

# --- nvs ---
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# --- Stack & Buffer Sizes ---
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=55296
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=40
CONFIG_NET_BUF_TX_COUNT=40

CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_APP_AP_IP_ADDRESS="192.168.4.1"
CONFIG_APP_AP_NETMASK="255.255.255.0"
CONFIG_APP_WIFI_SSID="Sumo_6_AP"
CONFIG_APP_WIFI_PSK="sumo1234"
CONFIG_APP_PSK_ID="asb-box"
CONFIG_APP_PSK="bajojajo"

# LOG Configuration
CONFIG_NET_LOG=y
CONFIG_NET_DHCPV4_SERVER_LOG_LEVEL_DBG=y
CONFIG_CBPRINTF_FP_SUPPORT=y