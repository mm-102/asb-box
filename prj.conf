# Wi-Fi Configuration
CONFIG_NETWORKING=y
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y

# --- IP & DHCP ---
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y

CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=10

# --- Sockets & CoAP ---
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_TCP=y
CONFIG_COAP=y

# --- Stack & Buffer Sizes ---
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=40
CONFIG_NET_BUF_TX_COUNT=40

CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_APP_AP_IP_ADDRESS="192.168.4.1"
CONFIG_APP_AP_NETMASK="255.255.255.0"
CONFIG_APP_WIFI_SSID="Sumo_6_AP"
CONFIG_APP_WIFI_PSK="sumo1234"

# LOG Configuration
CONFIG_NET_LOG=y
CONFIG_NET_DHCPV4_SERVER_LOG_LEVEL_DBG=y